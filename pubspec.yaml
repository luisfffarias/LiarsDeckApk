name: liarsDeck
description: Liars Deck multiplayer app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:

  flutter:
    sdk: flutter

  # 🌐 HTTP client (API)
  dio: ^5.4.0

  # Cliente para efeitos sonoros
  audioplayers: ^6.0.0

  # 🔐 salvar JWT com segurança
  flutter_secure_storage: ^9.0.0

  http: ^1.2.0

  # 🧠 estado (opcional mas útil)
  provider: ^6.1.2
  
  # Socket IO para conexao com servidor
  socket_io_client: ^3.0.0

  # 🧭 rotas (opcional mas recomendado)
  go_router: ^14.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/avatar/
    - assets/images/cards/
    - assets/audio/theme.mp3
    - assets/audio/card-slide-6.ogg
